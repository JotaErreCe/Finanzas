<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finanzas">
<meta name="theme-color" content="#0a1220">
<title>Finanzas Familiares</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">
<style>
:root {
  --bg: #0a1220;
  --panel: #111b2e;
  --panel2: #172947;
  --border: rgba(45, 212, 165, .22);
  --border-strong: rgba(45, 212, 165, .45);
  --line: rgba(255, 255, 255, .06);
  --text: #eef3f8;
  --text-dim: #93a4bb;
  --text-faint: #56637a;
  --teal: #22d3a5;
  --teal-deep: #0c3a30;
  --amber: #f5a623;
  --amber-deep: #3a2a0a;
  --red: #f0554a;
  --red-deep: #3a1310;
  --blue: #4d9dfa;
  --purple: #b18aff;
  --pink: #f472b6;
  --r-lg: 18px;
  --r-md: 14px;
  --r-sm: 10px;
  --sans: 'Manrope', sans-serif;
  --mono: 'Spline Sans Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  font-family: var(--sans);
  background:
    radial-gradient(ellipse 100% 40% at 50% -5%, rgba(34, 211, 165, .1), transparent 60%),
    var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 96px);
}
.num { font-family: var(--mono); font-variant-numeric: tabular-nums; }

/* ── REVEALS ── */
@keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
.reveal { opacity: 0; animation: rise .5s cubic-bezier(.22,.9,.3,1) forwards; animation-delay: calc(var(--d, 0) * 60ms); }
@media (prefers-reduced-motion: reduce) {
  .reveal { animation: none; opacity: 1; }
  * { transition: none !important; }
}

/* ── TOPBAR ── */
.topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.1rem 1.25rem .6rem;
}
.brand { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 800; letter-spacing: -.01em; }
.brand i { color: var(--teal); font-size: 18px; }
.icon-btn {
  background: var(--panel); border: 1px solid var(--border);
  color: var(--text-dim); width: 34px; height: 34px; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: background .15s, transform .15s;
}
.icon-btn:active { background: var(--panel2); transform: scale(.92); }
.icon-btn.spinning i { animation: spin .7s linear infinite; }

/* ── KPI GRID ── */
.kpi-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 9px;
  padding: .4rem 1.25rem 0;
}
.kpi-card {
  background: var(--panel);
  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  padding: 14px 15px;
  position: relative; overflow: hidden;
}
.kpi-card.lead { grid-column: 1 / -1; }
.kpi-icon {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; margin-bottom: 10px;
}
.kpi-label { font-size: 12.5px; color: var(--text-dim); font-weight: 600; margin-bottom: 4px; }
.kpi-val { font-size: 22px; font-weight: 800; letter-spacing: -.01em; font-variant-numeric: tabular-nums; }
.kpi-val.neg { color: var(--red); }
.kpi-sub { font-size: 11px; color: var(--text-faint); margin-top: 3px; }
.kpi-card.lead .kpi-val { font-size: 34px; }
.kpi-ring { position: absolute; top: 14px; right: 15px; }
.ring-svg { transform: rotate(-90deg); display: block; }
.ring-track { fill: none; stroke: var(--panel2); stroke-width: 5; }
.ring-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset .8s cubic-bezier(.22,.9,.3,1); }
.ring-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12px; font-weight: 700; font-family: var(--mono); }

/* ── SECCIONES ── */
.section {
  margin: 12px 1.25rem 0;
  background: var(--panel);
  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  padding: 1.05rem 1.1rem;
}
.section-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .9rem; }
.section-title { font-size: 15.5px; font-weight: 700; letter-spacing: -.005em; }
.section-sub { font-size: 11px; color: var(--text-faint); font-family: var(--mono); }

/* ── TENDENCIA ── */
.chart-wrap { position: relative; }
.chart-svg { display: block; width: 100%; height: auto; }
.chart-legend { display: flex; gap: 14px; margin-top: 8px; font-size: 11px; color: var(--text-dim); }
.leg { display: flex; align-items: center; gap: 6px; }
.leg-line { width: 16px; height: 2px; border-radius: 2px; }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.delta-chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; font-weight: 700; font-family: var(--mono);
  padding: 4px 10px; border-radius: 20px; margin-top: 10px;
}
.delta-chip.good { background: var(--teal-deep); color: var(--teal); }
.delta-chip.bad { background: var(--red-deep); color: var(--red); }

/* ── FIJOS ── */
.fijos-progress { margin-bottom: .9rem; }
.fijos-bar-bg { background: var(--panel2); height: 6px; border-radius: 3px; overflow: hidden; margin-top: 7px; }
.fijos-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--amber), var(--teal)); transition: width .7s cubic-bezier(.22,.9,.3,1); }
.fijos-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); font-weight: 600; }
.fijo-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 2px; border-bottom: 1px solid var(--line);
  cursor: pointer; user-select: none; -webkit-user-select: none;
}
.fijo-row:last-child { border-bottom: none; }
.fijo-check {
  width: 23px; height: 23px; border-radius: 7px; flex-shrink: 0;
  border: 1.5px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: transparent;
  transition: all .2s cubic-bezier(.22,.9,.3,1);
}
.fijo-row.pagado .fijo-check { background: var(--teal); border-color: var(--teal); color: #062a21; transform: scale(1.05); }
.fijo-row.enviando .fijo-check { opacity: .4; }
.fijo-body { flex: 1; min-width: 0; }
.fijo-nombre { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .2s; }
.fijo-row.pagado .fijo-nombre { color: var(--text-faint); text-decoration: line-through; text-decoration-color: rgba(147, 164, 187, .5); }
.fijo-fecha { font-size: 10.5px; color: var(--text-faint); margin-top: 1px; }
.fijo-monto { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text-dim); flex-shrink: 0; }
.fijo-row.pagado .fijo-monto { color: var(--text-faint); }
.cobros-toggle {
  width: 100%; background: none; border: none; color: var(--text-faint);
  font-family: var(--sans); font-size: 11.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  padding: 10px 0 2px; cursor: pointer; display: flex; align-items: center; gap: 6px;
}
.cobros-toggle i { transition: transform .25s; }
.cobros-toggle.open i { transform: rotate(90deg); }

/* ── MÉTODOS (donut) ── */
.donut-row { display: flex; align-items: center; gap: 18px; }
.donut-svg { flex-shrink: 0; }
.donut-total { position: relative; }
.donut-total-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
.donut-total-val b { display: block; font-size: 16px; font-weight: 800; font-family: var(--mono); }
.donut-total-val span { font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .06em; }
.donut-legend { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 9px; }
.dl-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.dl-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-dim); font-weight: 500; }
.dl-val { font-family: var(--mono); font-weight: 600; color: var(--text); flex-shrink: 0; }

/* ── FILTROS + RUBROS ── */
.filters { display: flex; gap: 6px; padding: 1rem 1.25rem .4rem; overflow-x: auto; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  font-family: var(--sans); font-size: 12px; font-weight: 700;
  padding: 6px 14px; border-radius: 20px;
  border: 1.5px solid var(--border); cursor: pointer; white-space: nowrap;
  background: var(--panel); color: var(--text-dim); transition: all .15s;
}
.filter-btn.active { background: var(--teal); color: #062a21; border-color: transparent; }
.filter-btn:active { opacity: .7; }
.rubros { padding: .35rem 1.25rem 0; display: flex; flex-direction: column; gap: 7px; }
.rubro-card {
  background: var(--panel); border: 1.5px solid var(--border);
  border-radius: var(--r-md); padding: 12px 13px;
  display: flex; align-items: center; gap: 11px;
  transition: transform .1s;
}
.rubro-card:active { transform: scale(.985); }
.icon-chip {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.rubro-body { flex: 1; min-width: 0; }
.rubro-row1 { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.rubro-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
.rubro-pct { font-size: 12px; font-weight: 700; font-family: var(--mono); flex-shrink: 0; }
.bar-bg { background: var(--panel2); height: 5px; border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
.bar-fill { height: 100%; border-radius: 3px; transition: width .6s cubic-bezier(.22,.9,.3,1); }
.rubro-row2 { display: flex; justify-content: space-between; align-items: center; }
.rubro-montos { font-size: 11px; color: var(--text-faint); font-family: var(--mono); }
.rubro-badge { font-size: 10px; font-weight: 700; padding: 2.5px 8px; border-radius: 10px; }

/* ── FAB ── */
.fab {
  position: fixed; right: max(1.25rem, calc(50% - 240px + 1.25rem));
  bottom: calc(env(safe-area-inset-bottom) + 1.4rem);
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(145deg, var(--teal), #199c79);
  color: #062a21; border: none; font-size: 26px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 60;
  box-shadow: 0 6px 24px rgba(34, 211, 165, .35), 0 2px 6px rgba(0,0,0,.4);
  transition: transform .18s cubic-bezier(.34,1.56,.64,1);
}
.fab:active { transform: scale(.88); }

/* ── SHEET (modal inferior) ── */
.backdrop {
  position: fixed; inset: 0; background: rgba(3, 6, 12, .65);
  backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 70;
}
.backdrop.show { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed; left: 50%; bottom: 0; transform: translate(-50%, 105%);
  width: 100%; max-width: 480px; z-index: 80;
  background: var(--panel2); border: 1px solid var(--border-strong); border-bottom: none;
  border-radius: 22px 22px 0 0;
  padding: 1.1rem 1.35rem calc(env(safe-area-inset-bottom) + 1.3rem);
  transition: transform .35s cubic-bezier(.22,.9,.3,1);
  max-height: 88vh; overflow-y: auto;
}
.sheet.show { transform: translate(-50%, 0); }
.sheet-handle { width: 38px; height: 4px; border-radius: 2px; background: var(--border-strong); margin: 0 auto 1rem; }
.sheet-title { font-size: 18px; font-weight: 800; margin-bottom: 1.1rem; }
.f-label { font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-faint); margin: .9rem 0 .4rem; display: block; font-weight: 700; }
.f-input, .f-select {
  width: 100%; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--r-sm); color: var(--text);
  font-family: var(--sans); font-size: 15px; padding: 11px 13px;
  outline: none; transition: border-color .15s;
  -webkit-appearance: none; appearance: none;
}
.f-input:focus, .f-select:focus { border-color: var(--teal); }
.monto-input-wrap { display: flex; align-items: center; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--r-md); padding: 4px 14px; transition: border-color .15s; }
.monto-input-wrap:focus-within { border-color: var(--teal); }
.monto-prefix { font-size: 24px; font-weight: 700; color: var(--text-dim); }
.monto-input {
  flex: 1; background: none; border: none; outline: none; color: var(--text);
  font-family: var(--sans); font-variant-numeric: tabular-nums;
  font-size: 32px; font-weight: 800; padding: 6px 0 6px 8px; width: 100%; min-width: 0;
}
.seg { display: flex; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--r-sm); padding: 3px; gap: 3px; }
.seg-btn {
  flex: 1; background: none; border: none; color: var(--text-dim);
  font-family: var(--sans); font-size: 12.5px; font-weight: 700;
  padding: 8px 4px; border-radius: 7px; cursor: pointer; transition: all .15s;
}
.seg-btn.active { background: var(--panel2); color: var(--text); }
.btn-primary {
  width: 100%; margin-top: 1.3rem;
  background: linear-gradient(145deg, var(--teal), #199c79); color: #062a21;
  border: none; border-radius: var(--r-md);
  font-family: var(--sans); font-size: 15px; font-weight: 800;
  padding: 14px; cursor: pointer; transition: transform .15s, opacity .15s;
}
.btn-primary:active { transform: scale(.98); }
.btn-primary:disabled { opacity: .5; }
.btn-ghost {
  width: 100%; margin-top: .6rem; background: none; border: 1.5px solid var(--border);
  color: var(--text-dim); border-radius: var(--r-md);
  font-family: var(--sans); font-size: 13.5px; font-weight: 700;
  padding: 12px; cursor: pointer;
}

/* ── TOAST ── */
.toast {
  position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 92px);
  transform: translate(-50%, 20px); opacity: 0;
  background: var(--panel2); border: 1.5px solid var(--border-strong); color: var(--text);
  font-size: 13px; font-weight: 600; padding: 10px 18px; border-radius: 30px;
  z-index: 95; transition: all .3s cubic-bezier(.22,.9,.3,1);
  display: flex; align-items: center; gap: 8px; max-width: 85%;
  box-shadow: 0 8px 30px rgba(0,0,0,.5);
}
.toast.show { transform: translate(-50%, 0); opacity: 1; }
.toast i.ok { color: var(--teal); }
.toast i.err { color: var(--red); }

/* ── ESTADOS ── */
.state-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 70vh; gap: 14px; color: var(--text-dim); padding: 0 2rem; text-align: center;
}
.state-brand { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 800; color: var(--text); }
.state-brand i { color: var(--teal); }
.spinner {
  width: 30px; height: 30px; border: 2.5px solid var(--panel2);
  border-top-color: var(--teal); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.footer { text-align: center; font-size: 11px; color: var(--text-faint); padding: 1.4rem 1.25rem .4rem; font-family: var(--mono); }
</style>
</head>
<body>

<div id="app">
  <div class="state-screen" id="loading">
    <div class="state-brand"><i class="ti ti-chart-donut-3"></i>Finanzas</div>
    <div class="spinner"></div>
    <div style="font-size:13px">Cargando datos…</div>
  </div>
</div>

<button class="fab" id="fab" style="display:none" aria-label="Agregar gasto"><i class="ti ti-plus"></i></button>

<div class="backdrop" id="backdrop"></div>

<!-- SHEET: nuevo gasto -->
<div class="sheet" id="sheetGasto">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Registrar gasto</div>
  <div class="monto-input-wrap">
    <span class="monto-prefix" id="montoPrefix">Q</span>
    <input class="monto-input" id="gMonto" type="number" inputmode="decimal" placeholder="0.00" step="0.01" min="0">
  </div>
  <label class="f-label">Descripción</label>
  <input class="f-input" id="gDesc" type="text" placeholder="¿En qué se gastó?" maxlength="80">
  <label class="f-label">Método</label>
  <div class="seg" id="gMetodo">
    <button class="seg-btn active" data-v="Transferencia">Transferencia</button>
    <button class="seg-btn" data-v="Efectivo">Efectivo</button>
  </div>
  <label class="f-label">Moneda</label>
  <div class="seg" id="gMoneda">
    <button class="seg-btn active" data-v="GTQ">Quetzales</button>
    <button class="seg-btn" data-v="USD">Dólares</button>
  </div>
  <label class="f-label">Persona</label>
  <div class="seg" id="gPersona">
    <button class="seg-btn active" data-v="Jr">Jr</button>
    <button class="seg-btn" data-v="Ms">Ms</button>
  </div>
  <label class="f-label">Rubro</label>
  <select class="f-select" id="gRubro"><option value="auto">Automático (según Reglas)</option></select>
  <button class="btn-primary" id="gGuardar">Guardar gasto</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════
// CONFIGURACIÓN (fija — nadie tiene que pegar nada para usar la app)
// ════════════════════════════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbzbZOdX4OzY5Ef2HVoLWtl7lsGIBn7V4fZAUshIOyHjQByo2xxODk7fc1zJ6q5P_iBS5A/exec";
const API_TOKEN = "0d046d3bbc6b41aba5cec9212b2a0d3b";
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSi9uOW_LsBOCR7dLU1GNzX-ezXwGMEQnxdmluzyeMJP-pAF5wO6oSfM65iQPjSONf3TE1JNi9OhLYC/pub?gid=266395096&single=true&output=csv";
const MOCK = new URLSearchParams(location.search).has("mock");

const ICONOS = {
  "Supermercado":               {icon:"ti-shopping-cart",  ic:"#f5a623"},
  "Restaurantes y comida fuera":{icon:"ti-tools-kitchen-2",ic:"#e08a4e"},
  "Gasolina":                   {icon:"ti-gas-station",    ic:"#f0554a"},
  "Transporte y carro":         {icon:"ti-car",            ic:"#f0554a"},
  "Salud":                      {icon:"ti-heart",          ic:"#f472b6"},
  "Mascotas":                   {icon:"ti-paw",            ic:"#8fce91"},
  "Entretenimiento":            {icon:"ti-confetti",       ic:"#b18aff"},
  "Country Club (consumos)":    {icon:"ti-ball-tennis",    ic:"#22d3a5"},
  "Hogar y mantenimiento":      {icon:"ti-tools",          ic:"#f5a623"},
  "Compras varias":             {icon:"ti-shirt",          ic:"#4d9dfa"},
  "Viajes":                     {icon:"ti-plane",          ic:"#4d9dfa"},
  "Suscripciones digitales":    {icon:"ti-cloud",          ic:"#b18aff"},
  "Visa Cuotas":                {icon:"ti-credit-card",    ic:"#f472b6"},
  "Luz Casa CC":                {icon:"ti-bulb",           ic:"#22d3a5"},
  "Luz Zona 14":                {icon:"ti-bulb",           ic:"#22d3a5"},
  "Impuestos":                  {icon:"ti-receipt-tax",    ic:"#b18aff"},
  "Otros":                      {icon:"ti-dots-circle-horizontal", ic:"#93a4bb"},
};
const DEFAULT_ICON = {icon:"ti-circle", ic:"#93a4bb"};
const METODO_ICONS = [
  [/^crédito/i, "ti-credit-card"],
  [/^débito/i, "ti-credit-card-pay"],
  [/^transferencia/i, "ti-arrows-exchange"],
  [/^efectivo/i, "ti-cash"],
];
const PALETA = ["#22d3a5", "#4d9dfa", "#f5a623", "#b18aff", "#f472b6", "#f0554a"];

let D = null;            // datos del dashboard
let filtro = "todos";
let cobrosAbierto = false;

// ════════════════════════════════════════════════════════════
// UTILIDADES
// ════════════════════════════════════════════════════════════
const $ = s => document.querySelector(s);
function fmtQ(n, dec = 2) {
  return "Q " + (n || 0).toLocaleString("es-GT", {minimumFractionDigits: dec, maximumFractionDigits: dec});
}
function fmtK(n) {
  return Math.abs(n) >= 10000 ? "Q" + Math.round(n / 1000) + "k" : "Q" + (n || 0).toLocaleString("es-GT", {maximumFractionDigits: 0});
}
function esc(s) { return (s || "").toString().replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function getColor(p) { return p >= 1 ? "var(--red)" : p >= .8 ? "var(--amber)" : "var(--teal)"; }
function getBadge(p) {
  if (p >= 1)  return {txt:"Excedido", bg:"var(--red-deep)", color:"var(--red)"};
  if (p >= .8) return {txt:"Cerca",    bg:"var(--amber-deep)", color:"var(--amber)"};
  return             {txt:"En rango",  bg:"var(--teal-deep)",  color:"var(--teal)"};
}
let toastTimer;
function toast(msg, ok = true) {
  const t = $("#toast");
  t.innerHTML = `<i class="ti ${ok ? "ti-circle-check ok" : "ti-alert-circle err"}"></i>${esc(msg)}`;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2800);
}

async function apiGet() {
  const res = await fetch(API_URL + "?token=" + encodeURIComponent(API_TOKEN) + "&_=" + Date.now());
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}
async function apiPost(body) {
  body.token = API_TOKEN;
  // text/plain evita el preflight CORS que Apps Script no contesta
  const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(body) });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function csvGet() {
  const res = await fetch(CSV_URL + "&_=" + Date.now());
  const text = await res.text();
  const rows = text.trim().split("\n").map(parseCSVLine);
  const rubros = [];
  let periodo = null;
  for (const row of rows) {
    // El CSV publica el período real: "Período: 2026-06-10 → 2026-07-09"
    if (!periodo && row[0]) {
      const m = row[0].match(/Per[íi]odo:\s*(\d{4})-(\d{2})-(\d{2})\s*(?:→|-|a)\s*(\d{4})-(\d{2})-(\d{2})/);
      if (m) {
        const ini = new Date(+m[1], +m[2] - 1, +m[3]);
        const fin = new Date(+m[4], +m[5] - 1, +m[6]);
        const f = dt => dt.toLocaleDateString("es-GT", {day: "numeric", month: "short"});
        periodo = {
          label: f(ini) + " – " + f(fin),
          diaActual: Math.min(Math.max(Math.floor((Date.now() - ini) / 86400000) + 1, 1), Math.round((fin - ini) / 86400000) + 1),
          diasTotales: Math.round((fin - ini) / 86400000) + 1
        };
      }
    }
  }
  for (const row of rows) {
    if (!row || row.length < 6) continue;
    const num = parseInt(row[0]);
    const nombre = (row[1] || "").trim();
    if (num >= 1 && num <= 30 && nombre.length > 2 && nombre !== "TOTAL") {
      const clean = s => parseFloat((s || "").replace(/[Q$\s]/g, "").replace(/\./g, "").replace(",", ".")) || 0;
      const pres = clean(row[2]), gast = clean(row[3]), disp = clean(row[4]);
      const pct = parseFloat((row[5] || "").replace(/[%\s]/g, "")) / 100 || 0;
      if (pres > 0 || gast > 0) rubros.push({nombre, pres, gast, disp, pct, txCount: parseInt(row[7]) || 0});
    }
  }
  if (rubros.length === 0) throw new Error("No se pudieron leer los rubros del CSV publicado.");
  return { modo: "csv", rubros, periodo, tendencia: [], metodos: [], fijos: [], rubrosLista: [] };
}
function parseCSVLine(line) {
  const out = []; let cur = "", q = false;
  for (const ch of line) {
    if (ch === '"') q = !q;
    else if (ch === "," && !q) { out.push(cur.trim()); cur = ""; }
    else cur += ch;
  }
  out.push(cur.trim());
  return out;
}

async function cargarDatos() {
  if (MOCK) { D = mockData(); render(); return; }
  try {
    D = await apiGet(); D.modo = "api";
    render();
  } catch (e) {
    console.error("API no disponible, usando CSV:", e);
    try { D = await csvGet(); render(); }
    catch (e2) { console.error(e2); renderError(e2.message); }
  }
}

function render() {

  const totalGast = D.rubros.reduce((s, r) => s + r.gast, 0);

  const alertas = D.rubros.filter(r => r.pct >= .8).length;
  const esAPI = D.modo === "api";

  const hora = new Date().toLocaleTimeString("es-GT", {hour: "2-digit", minute: "2-digit"});
  const r = 22, circ = 2 * Math.PI * r;
  const offset = circ * (1 - Math.min(pctGlobal, 1));
  const colorG = getColor(pctGlobal);

  let d = 0; // contador de reveals
  let html = `
    <div class="topbar reveal" style="--d:${d++}">
      <div class="brand"><i class="ti ti-chart-donut-3"></i>Finanzas Familiares</div>

            <circle class="ring-track" cx="26" cy="26" r="${r}"/>
            <circle class="ring-fill" cx="26" cy="26" r="${r}" stroke="${colorG}"
              stroke-dasharray="${circ}" stroke-dashoffset="${circ}" data-offset="${offset}"/>
          </svg>
          <div class="ring-label" style="color:${colorG}">${Math.round(pctGlobal * 100)}%</div>
        </div>

        <div class="kpi-label">${disponible < 0 ? "Excedido este período" : "Disponible este período"}</div>
        <div class="kpi-val num ${disponible < 0 ? "neg" : ""}">${fmtQ(Math.abs(disponible))}</div>

      </div>

      <div class="kpi-card">
        <div class="kpi-icon" style="background:rgba(77,157,250,.15)"><i class="ti ti-target-arrow" style="color:var(--blue)"></i></div>
        <div class="kpi-label">Presupuesto</div>
        <div class="kpi-val num">${fmtK(totalPres)}</div>

      <div class="kpi-card">
        <div class="kpi-icon" style="background:${colorG === "var(--red)" ? "rgba(240,85,74,.15)" : "var(--teal-deep)"}"><i class="ti ti-receipt-2" style="color:${colorG}"></i></div>
        <div class="kpi-label">Gastado</div>

      </div>
      <div class="kpi-card" style="grid-column:1/-1">
        <div class="kpi-icon" style="background:${alertas ? "rgba(240,85,74,.15)" : "var(--teal-deep)"}"><i class="ti ti-alert-triangle" style="color:${alertas ? "var(--red)" : "var(--teal)"}"></i></div>
        <div class="kpi-label">Rubros en alerta</div>
        <div class="kpi-val num" style="color:${alertas ? "var(--red)" : "var(--teal)"}">${alertas}</div>
      </div>
    </div>`;

  if (esAPI && D.tendencia && D.tendencia.length) html += renderTendencia(d++);
  if (esAPI && D.fijos && D.fijos.length) html += renderFijos(d++);
  if (esAPI && D.metodos && D.metodos.length) html += renderMetodos(d++);

  const rubrosAlerta = D.rubros.filter(x => x.pct >= .8);

// ── Tendencia ──
function renderTendencia(d) {
  const t = D.tendencia;
  const W = 320, H = 130, PX = 6, PT = 12, PB = 18;
  const maxV = Math.max(...t.map(p => Math.max(p.actual || 0, p.anterior || 0)), 1);
  const x = i => PX + (i / (t.length - 1)) * (W - PX * 2);
  const y = v => PT + (1 - v / maxV) * (H - PT - PB);

  const ptsAct = t.filter(p => p.actual !== null);
  const pathA = ptsAct.map((p, i) => `${i ? "L" : "M"}${x(t.indexOf(p)).toFixed(1)},${y(p.actual).toFixed(1)}`).join("");
  const pathB = t.map((p, i) => `${i ? "L" : "M"}${x(i).toFixed(1)},${y(p.anterior).toFixed(1)}`).join("");
  const areaA = ptsAct.length
    ? pathA + `L${x(t.indexOf(ptsAct[ptsAct.length - 1])).toFixed(1)},${H - PB}L${x(t.indexOf(ptsAct[0])).toFixed(1)},${H - PB}Z`
    : "";

  const ult = ptsAct[ptsAct.length - 1];
  const idxUlt = t.indexOf(ult);
  const delta = ult ? ult.actual - t[idxUlt].anterior : 0;
  const mejor = delta <= 0;

  return `
  <div class="section reveal" style="--d:${d}">
    <div class="section-head">
      <div class="section-title">Tendencia</div>
      <div class="section-sub">acumulado del ciclo</div>
    </div>
    <div class="chart-wrap">
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#22d3a5" stop-opacity=".25"/>
            <stop offset="100%" stop-color="#22d3a5" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${[.25, .5, .75].map(f => `<line x1="${PX}" y1="${(PT + (1 - f) * (H - PT - PB)).toFixed(1)}" x2="${W - PX}" y2="${(PT + (1 - f) * (H - PT - PB)).toFixed(1)}" stroke="rgba(255,255,255,.06)" stroke-width="1" stroke-dasharray="2 3"/>`).join("")}
        <path d="${pathB}" fill="none" stroke="#56637a" stroke-width="1.5" stroke-dasharray="4 4"/>
        ${areaA ? `<path d="${areaA}" fill="url(#areaGrad)"/>` : ""}
        ${pathA ? `<path d="${pathA}" fill="none" stroke="#22d3a5" stroke-width="2.4" stroke-linecap="round"/>` : ""}
        ${ult ? `<circle cx="${x(idxUlt).toFixed(1)}" cy="${y(ult.actual).toFixed(1)}" r="3.5" fill="#22d3a5" stroke="#111b2e" stroke-width="1.5"/>` : ""}
        <text x="${PX}" y="${H - 4}" font-size="9" fill="#56637a" font-family="monospace">día 1</text>
        <text x="${W - PX}" y="${H - 4}" font-size="9" fill="#56637a" font-family="monospace" text-anchor="end">día ${t.length}</text>
        <text x="${PX}" y="${PT - 3}" font-size="9" fill="#56637a" font-family="monospace">${fmtK(maxV)}</text>
      </svg>
    </div>
    <div class="chart-legend">
      <div class="leg"><div class="leg-line" style="background:#22d3a5"></div>Este período</div>
      <div class="leg"><div class="leg-line" style="background:#56637a;border-top:2px dashed #56637a;height:0"></div>Período anterior</div>
    </div>
    ${ult ? `<div class="delta-chip ${mejor ? "good" : "bad"}"><i class="ti ${mejor ? "ti-trending-down" : "ti-trending-up"}"></i>${fmtQ(Math.abs(delta), 0)} ${mejor ? "menos" : "más"} que el ciclo pasado</div>` : ""}
  </div>`;
}

// ── Fijos ──
function renderFijos(d) {
  const egresos = D.fijos.filter(f => f.tipo === "Egreso");
  const ingresos = D.fijos.filter(f => f.tipo === "Ingreso");

  const fila = f => `
    <div class="fijo-row ${f.pagado ? "pagado" : ""}" data-id="${esc(f.id)}" data-tipo="${esc(f.tipo)}" role="checkbox" aria-checked="${f.pagado}">

  return `

      </button>

function mesActualNombre() {

}

// ── Métodos (donut) ──
function renderMetodos(d) {
  const total = D.metodos.reduce((s, m) => s + m.total, 0) || 1;
  const size = 128, thickness = 18, radio = (size - thickness) / 2, circ = 2 * Math.PI * radio;
  let acumulado = 0;
  const segmentos = D.metodos.map((m, i) => {
    const color = PALETA[i % PALETA.length];
    const dash = (m.total / total) * circ;
    const el = `<circle cx="${size/2}" cy="${size/2}" r="${radio}" fill="none" stroke="${color}" stroke-width="${thickness}"
      stroke-dasharray="${dash.toFixed(1)} ${(circ - dash).toFixed(1)}" stroke-dashoffset="${(-acumulado).toFixed(1)}"
      transform="rotate(-90 ${size/2} ${size/2})"/>`;
    acumulado += dash;
    return el;
  }).join("");

  return `
  <div class="section reveal" style="--d:${d}">
    <div class="section-head">
      <div class="section-title">Métodos de pago</div>
      <div class="section-sub">este período</div>
    </div>
    <div class="donut-row">
      <div class="donut-total">
        <svg class="donut-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${segmentos}</svg>
        <div class="donut-total-val"><b>${fmtK(total)}</b><span>Total</span></div>
      </div>
      <div class="donut-legend">
        ${D.metodos.map((m, i) => {
          const icon = (METODO_ICONS.find(([re]) => re.test(m.nombre)) || [null, "ti-wallet"])[1];

          <div class="dl-row">
            <div class="leg-dot" style="background:${PALETA[i % PALETA.length]}"></div>
            <div class="dl-name">${esc(m.nombre)}</div>
            <div class="dl-val">${m.pct}%</div>
          </div>`;
        }).join("")}
      </div>
    </div>
  </div>`;
}

  }).join("") + `</div>`;
}

// ── Pantallas de estado ──
function renderError(msg) {
  $("#app").innerHTML = `
    <div class="state-screen">
      <i class="ti ti-wifi-off" style="font-size:32px"></i>
      <div style="font-size:13.5px;line-height:1.6;max-width:280px">${esc(msg || "No se pudieron cargar los datos.")}</div>
      <button class="btn-primary" style="max-width:220px" onclick="recargarUI()">Reintentar</button>
    </div>`;
}
function recargarUI() {
  $("#app").innerHTML = `<div class="state-screen"><div class="state-brand"><i class="ti ti-chart-donut-3"></i>Finanzas</div><div class="spinner"></div><div style="font-size:13px">Cargando datos…</div></div>`;
  cargarDatos();
}
async function refrescar() {
  const btn = $("#btnRefresh");
  if (btn) btn.classList.add("spinning");
  try {
    if (MOCK) { D = mockData(); }
    else {
      try { D = await apiGet(); D.modo = "api"; }
      catch (e) { D = await csvGet(); }
    }
    render();
    toast("Datos actualizados");
  } catch (e) { toast(e.message, false); }
  finally { if ($("#btnRefresh")) $("#btnRefresh").classList.remove("spinning"); }
}

// ════════════════════════════════════════════════════════════
// INTERACCIONES
// ════════════════════════════════════════════════════════════
// Marcar fijo como pagado/cobrado (optimista, revierte si falla)
async function toggleFijo(row) {
  if (row.classList.contains("enviando")) return;
  const id = row.dataset.id;
  const f = D.fijos.find(x => x.id.toString() === id && x.tipo === row.dataset.tipo);
  if (!f) return;
  const nuevo = !f.pagado;

  f.pagado = nuevo;                    // UI optimista
  row.classList.toggle("pagado", nuevo);
  row.classList.add("enviando");

  if (MOCK) { setTimeout(() => { row.classList.remove("enviando"); render(); }, 300); return; }

  try {
    const ahora = new Date();
    await apiPost({ action: "marcarPago", anio: ahora.getFullYear(), mes: ahora.getMonth() + 1, id: f.id, pagado: nuevo });
    f.fechaPago = nuevo ? ahora.toISOString().slice(0, 10) : "";
    render();
    toast(nuevo ? `${f.nombre} marcado como ${f.tipo === "Ingreso" ? "cobrado" : "pagado"}` : `${f.nombre} desmarcado`);
  } catch (e) {
    f.pagado = !nuevo;                 // revertir
    render();
    toast("No se pudo guardar: " + e.message, false);
  }
}

// ── Sheets (modales) ──
function abrirSheet(id) {
  $("#backdrop").classList.add("show");
  $(id).classList.add("show");
}
function cerrarSheets() {
  $("#backdrop").classList.remove("show");
  document.querySelectorAll(".sheet").forEach(s => s.classList.remove("show"));
}
$("#backdrop").onclick = cerrarSheets;

// ── Formulario de gasto ──
$("#fab").onclick = () => {
  $("#gMonto").value = "";
  $("#gDesc").value = "";
  abrirSheet("#sheetGasto");
  setTimeout(() => $("#gMonto").focus(), 350);
};
document.querySelectorAll(".seg").forEach(seg => {
  seg.addEventListener("click", e => {
    const btn = e.target.closest(".seg-btn");
    if (!btn) return;
    seg.querySelectorAll(".seg-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    if (seg.id === "gMoneda") $("#montoPrefix").textContent = btn.dataset.v === "USD" ? "$" : "Q";
  });
});
function segVal(id) { return $(id + " .seg-btn.active").dataset.v; }

$("#gGuardar").onclick = async () => {
  const monto = parseFloat($("#gMonto").value);
  const desc = $("#gDesc").value.trim();
  if (!monto || monto <= 0) { toast("Ingresa un monto válido", false); return; }
  if (!desc) { toast("Falta la descripción", false); return; }

  const btn = $("#gGuardar");
  btn.disabled = true; btn.textContent = "Guardando…";
  try {
    if (MOCK) await new Promise(r => setTimeout(r, 500));
    else await apiPost({
      action: "addGasto",
      monto: monto,
      moneda: segVal("#gMoneda"),
      comercio: desc,
      metodo: segVal("#gMetodo"),
      persona: segVal("#gPersona"),
      rubro: $("#gRubro").value
    });
    cerrarSheets();
    toast("Gasto registrado ✓");
    if (!MOCK) refrescar();
  } catch (e) {
    toast("No se pudo guardar: " + e.message, false);
  } finally {
    btn.disabled = false; btn.textContent = "Guardar gasto";
  }
};

// ════════════════════════════════════════════════════════════
window.recargarUI = recargarUI;
cargarDatos();
</script>
